name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-check:
    name: Build Docker image and check containers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: docker compose build

      - name: Start containers
        run: docker compose up -d

      - name: Show running containers
        run: docker compose ps

      - name: Check stats server is reachable
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:9090/actuator/health >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          docker compose logs stats-server
          exit 1

      - name: Check main service is reachable
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/actuator/health >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          docker compose logs ewm-service
          exit 1

      - name: Stop containers
        if: always()
        run: docker compose down -v

  deploy:
    name: Deploy to virtual machine
    needs: build-and-check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Check deploy secrets
        id: deploy-secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          PROJECT_PATH: ${{ secrets.PROJECT_PATH }}
        run: |
          if [ -z "$SSH_HOST" ] || [ -z "$SSH_USER" ] || [ -z "$SSH_PRIVATE_KEY" ] || [ -z "$PROJECT_PATH" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Deploy skipped: add SSH_HOST, SSH_USER, SSH_PRIVATE_KEY and PROJECT_PATH repository secrets."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy over SSH
        if: steps.deploy-secrets.outputs.enabled == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            cd "${{ secrets.PROJECT_PATH }}"
            git pull
            docker compose up -d --build
            docker compose ps
