name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-check:
    name: Build Docker image and check containers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: docker compose build

      - name: Start containers
        run: docker compose up -d

      - name: Show running containers
        run: docker compose ps

      - name: Check stats server is reachable
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:9090/actuator/health >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          docker compose logs stats-server
          exit 1

      - name: Check main service is reachable
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/actuator/health >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          docker compose logs ewm-service
          exit 1

      - name: Stop containers
        if: always()
        run: docker compose down -v

  deploy:
    name: Deploy on local Mac
    needs: build-and-check
    runs-on: self-hosted
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy on Mac
        run: |
          cd ~/explore-with-me
          git pull origin main
          docker compose up -d --build
          docker compose ps