services:
  ewm-service:
    build:
      context: ./ewm-main-service
    image: ewm-main-service
    container_name: ewm-main-service
    depends_on:
      ewm-db:
        condition: service_healthy
      stats-server:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      MAIN_SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://ewm-db:5432/ewm_main
      SPRING_DATASOURCE_USERNAME: main
      SPRING_DATASOURCE_PASSWORD: main
      STATS_SERVER_URL: http://stats-server:9090

  ewm-db:
    image: postgres:16.1
    container_name: ewm-main-db
    ports:
      - "6541:5432"
    environment:
      POSTGRES_DB: ewm_main
      POSTGRES_USER: main
      POSTGRES_PASSWORD: main
    volumes:
      - main-db-data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U main -d ewm_main
      interval: 5s
      timeout: 5s
      retries: 10

  stats-server:
    build:
      context: ./ewm-stats-service/stats-server
    image: ewm-stats-server
    container_name: ewm-stats-server
    depends_on:
      stats-db:
        condition: service_healthy
    ports:
      - "9090:9090"
    environment:
      STATS_SERVER_PORT: 9090
      SPRING_DATASOURCE_URL: jdbc:postgresql://stats-db:5432/ewm_stats
      SPRING_DATASOURCE_USERNAME: stats
      SPRING_DATASOURCE_PASSWORD: stats

  stats-db:
    image: postgres:16.1
    container_name: ewm-stats-db
    ports:
      - "6542:5432"
    environment:
      POSTGRES_DB: ewm_stats
      POSTGRES_USER: stats
      POSTGRES_PASSWORD: stats
    volumes:
      - stats-db-data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U stats -d ewm_stats
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  main-db-data:
  stats-db-data:
